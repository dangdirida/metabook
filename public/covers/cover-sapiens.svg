<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262d2e"/>
      <stop offset="60%" stop-color="#007a58"/>
      <stop offset="100%" stop-color="#32d29d"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg2)"/>
  <!-- Evolution timeline - footprints/dots ascending -->
  <circle cx="60" cy="350" r="3" fill="#dff4ea" opacity="0.3"/>
  <circle cx="80" cy="330" r="3.5" fill="#dff4ea" opacity="0.35"/>
  <circle cx="105" cy="305" r="4" fill="#dff4ea" opacity="0.4"/>
  <circle cx="125" cy="275" r="4.5" fill="#dff4ea" opacity="0.45"/>
  <circle cx="150" cy="245" r="5" fill="#dff4ea" opacity="0.5"/>
  <!-- Human silhouette abstract (geometric) -->
  <circle cx="150" cy="80" r="22" fill="none" stroke="#32d29d" stroke-width="2" opacity="0.6"/>
  <circle cx="150" cy="80" r="15" fill="#32d29d" opacity="0.15"/>
  <line x1="150" y1="102" x2="150" y2="145" stroke="#32d29d" stroke-width="2" opacity="0.5"/>
  <line x1="150" y1="115" x2="130" y2="135" stroke="#32d29d" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="115" x2="170" y2="135" stroke="#32d29d" stroke-width="1.5" opacity="0.4"/>
  <!-- DNA helix suggestion -->
  <ellipse cx="230" cy="150" rx="15" ry="40" fill="none" stroke="#dff4ea" stroke-width="1" opacity="0.2" transform="rotate(20,230,150)"/>
  <ellipse cx="240" cy="150" rx="15" ry="40" fill="none" stroke="#dff4ea" stroke-width="1" opacity="0.2" transform="rotate(-20,240,150)"/>
  <!-- Title -->
  <text x="150" y="200" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="44" fill="#ffffff" letter-spacing="6">사피엔스</text>
  <!-- Subtitle line -->
  <line x1="60" y1="215" x2="240" y2="215" stroke="#dff4ea" stroke-width="1" opacity="0.5"/>
  <text x="150" y="235" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#dff4ea" opacity="0.7">유인원에서 사이보그까지, 인류 역사의 대담한 통찰</text>
  <!-- Author -->
  <text x="150" y="385" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" opacity="0.8">유발 하라리</text>
  <!-- Bottom accent -->
  <rect x="0" y="395" width="300" height="5" fill="#32d29d"/>
</svg>