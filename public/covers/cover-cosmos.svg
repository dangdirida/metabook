<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#5b1dcd"/>
      <stop offset="60%" stop-color="#262d2e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg3)"/>
  <!-- Stars -->
  <circle cx="30" cy="25" r="1.2" fill="#fff" opacity="0.8"/>
  <circle cx="80" cy="50" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="250" cy="30" r="1.5" fill="#fff" opacity="0.9"/>
  <circle cx="270" cy="80" r="0.7" fill="#fff" opacity="0.5"/>
  <circle cx="200" cy="15" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="45" cy="100" r="0.9" fill="#fff" opacity="0.6"/>
  <circle cx="130" cy="40" r="1.3" fill="#fff" opacity="0.8"/>
  <circle cx="220" cy="120" r="0.6" fill="#fff" opacity="0.5"/>
  <circle cx="15" cy="200" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="285" cy="180" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="50" cy="300" r="1.1" fill="#fff" opacity="0.7"/>
  <circle cx="260" cy="350" r="0.9" fill="#fff" opacity="0.5"/>
  <circle cx="170" cy="370" r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="100" cy="380" r="0.7" fill="#fff" opacity="0.5"/>
  <!-- Planet/orbit rings -->
  <circle cx="150" cy="160" r="60" fill="none" stroke="#7e5ae2" stroke-width="0.8" opacity="0.3"/>
  <circle cx="150" cy="160" r="90" fill="none" stroke="#7e5ae2" stroke-width="0.5" opacity="0.2"/>
  <circle cx="150" cy="160" r="120" fill="none" stroke="#7e5ae2" stroke-width="0.3" opacity="0.15"/>
  <!-- Central planet -->
  <circle cx="150" cy="160" r="25" fill="#7e5ae2" opacity="0.4"/>
  <circle cx="150" cy="160" r="18" fill="#5b1dcd" opacity="0.6"/>
  <!-- Small orbiting dots -->
  <circle cx="210" cy="160" r="4" fill="#ebe8fc" opacity="0.7"/>
  <circle cx="120" cy="80" r="3" fill="#32d29d" opacity="0.6"/>
  <!-- Nebula glow -->
  <ellipse cx="80" cy="140" rx="40" ry="25" fill="#7e5ae2" opacity="0.08"/>
  <ellipse cx="220" cy="200" rx="35" ry="20" fill="#5b1dcd" opacity="0.06"/>
  <!-- Title -->
  <text x="150" y="280" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="48" fill="#ffffff" letter-spacing="10">코스모스</text>
  <line x1="70" y1="295" x2="230" y2="295" stroke="#7e5ae2" stroke-width="1.5" opacity="0.6"/>
  <text x="150" y="315" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ebe8fc" opacity="0.7">우주의 아름다움과 경이로움을 탐험하다</text>
  <!-- Author -->
  <text x="150" y="375" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ebe8fc" opacity="0.8">칼 세이건</text>
</svg>