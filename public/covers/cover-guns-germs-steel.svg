<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007a58"/>
      <stop offset="100%" stop-color="#262d2e"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg1)"/>
  <!-- Continent-like geometric shapes -->
  <polygon points="40,120 80,90 120,110 130,150 90,160 50,150" fill="#32d29d" opacity="0.25"/>
  <polygon points="160,80 210,70 230,100 220,140 180,150 155,120" fill="#32d29d" opacity="0.2"/>
  <polygon points="100,200 140,180 170,210 150,250 110,240" fill="#00c389" opacity="0.15"/>
  <polygon points="200,190 250,170 270,210 240,250 200,230" fill="#dff4ea" opacity="0.1"/>
  <!-- Horizontal divider lines -->
  <line x1="50" y1="260" x2="250" y2="260" stroke="#32d29d" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="268" x2="230" y2="268" stroke="#32d29d" stroke-width="0.8" opacity="0.4"/>
  <!-- Crossed elements: gun, germ, wheat -->
  <circle cx="100" cy="320" r="8" fill="none" stroke="#dff4ea" stroke-width="1.5" opacity="0.5"/>
  <circle cx="100" cy="320" r="4" fill="none" stroke="#dff4ea" stroke-width="1" opacity="0.4"/>
  <line x1="145" y1="310" x2="155" y2="330" stroke="#dff4ea" stroke-width="2" opacity="0.5"/>
  <line x1="148" y1="315" x2="160" y2="312" stroke="#dff4ea" stroke-width="1" opacity="0.4"/>
  <line x1="195" y1="330" x2="200" y2="305" stroke="#dff4ea" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="305" x2="205" y2="310" stroke="#dff4ea" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="305" x2="195" y2="308" stroke="#dff4ea" stroke-width="1.5" opacity="0.4"/>
  <!-- Title -->
  <text x="150" y="165" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="38" fill="#ffffff" letter-spacing="8">총, 균, 쇠</text>
  <!-- Subtitle -->
  <text x="150" y="195" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#dff4ea" opacity="0.8">무기, 병균, 금속은 인류의 운명을 어떻게 바꿨는가</text>
  <!-- Author -->
  <text x="150" y="370" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#dff4ea" opacity="0.7">재레드 다이아몬드</text>
  <!-- Top decorative bar -->
  <rect x="0" y="0" width="300" height="5" fill="#32d29d" opacity="0.8"/>
</svg>