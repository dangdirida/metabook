<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262d2e"/>
      <stop offset="100%" stop-color="#6c7e84"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg8)"/>
  <!-- Large "21" as background element -->
  <text x="150" y="180" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="140" fill="#32d29d" opacity="0.08">21</text>
  <!-- Grid of 21 small squares (7x3) representing lessons -->
  <g opacity="0.5">
    <rect x="55" y="60" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="82" y="60" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="109" y="60" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="136" y="60" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="163" y="60" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="190" y="60" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="217" y="60" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="55" y="87" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="82" y="87" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="109" y="87" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="136" y="87" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="163" y="87" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="190" y="87" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="217" y="87" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="55" y="114" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="82" y="114" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="109" y="114" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="136" y="114" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="163" y="114" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="190" y="114" width="18" height="18" rx="2" fill="none" stroke="#32d29d" stroke-width="1"/>
    <rect x="217" y="114" width="18" height="18" rx="2" fill="#32d29d" opacity="0.3"/>
  </g>
  <!-- Connecting lines between some squares -->
  <line x1="73" y1="69" x2="82" y2="69" stroke="#00c389" stroke-width="0.5" opacity="0.4"/>
  <line x1="127" y1="96" x2="136" y2="96" stroke="#00c389" stroke-width="0.5" opacity="0.4"/>
  <line x1="181" y1="123" x2="190" y2="123" stroke="#00c389" stroke-width="0.5" opacity="0.4"/>
  <!-- Globe suggestion -->
  <circle cx="150" cy="200" r="30" fill="none" stroke="#32d29d" stroke-width="1" opacity="0.2"/>
  <ellipse cx="150" cy="200" rx="30" ry="12" fill="none" stroke="#32d29d" stroke-width="0.8" opacity="0.15"/>
  <line x1="150" y1="170" x2="150" y2="230" stroke="#32d29d" stroke-width="0.8" opacity="0.15"/>
  <!-- Title -->
  <text x="150" y="270" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="22" fill="#ffffff">21세기를 위한</text>
  <text x="150" y="300" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="22" fill="#ffffff">21가지 제언</text>
  <line x1="60" y1="315" x2="240" y2="315" stroke="#32d29d" stroke-width="1" opacity="0.5"/>
  <text x="150" y="335" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#dff4ea" opacity="0.6">지금 여기, 우리가 직면한 질문들</text>
  <!-- Author -->
  <text x="150" y="375" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#dff4ea" opacity="0.8">유발 하라리</text>
  <!-- Green accent bars -->
  <rect x="0" y="0" width="300" height="4" fill="#32d29d" opacity="0.7"/>
  <rect x="0" y="396" width="300" height="4" fill="#32d29d" opacity="0.7"/>
</svg>