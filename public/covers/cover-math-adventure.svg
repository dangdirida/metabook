<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#32d29d"/>
      <stop offset="100%" stop-color="#007a58"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg5)"/>
  <!-- Playful math symbols scattered -->
  <text x="30" y="60" font-family="sans-serif" font-weight="bold" font-size="28" fill="#dff4ea" opacity="0.3">+</text>
  <text x="250" y="50" font-family="sans-serif" font-weight="bold" font-size="32" fill="#ffffff" opacity="0.25">x</text>
  <text x="60" y="130" font-family="sans-serif" font-weight="bold" font-size="24" fill="#dff4ea" opacity="0.2">÷</text>
  <text x="230" y="140" font-family="sans-serif" font-weight="bold" font-size="30" fill="#ffffff" opacity="0.2">=</text>
  <text x="40" y="350" font-family="sans-serif" font-weight="bold" font-size="26" fill="#dff4ea" opacity="0.25">%</text>
  <text x="240" y="370" font-family="sans-serif" font-weight="bold" font-size="28" fill="#ffffff" opacity="0.2">π</text>
  <!-- Fun geometric shapes -->
  <circle cx="70" cy="200" r="20" fill="none" stroke="#dff4ea" stroke-width="2" opacity="0.4"/>
  <rect x="200" y="85" width="35" height="35" rx="5" fill="none" stroke="#dff4ea" stroke-width="2" opacity="0.35" transform="rotate(15,217,102)"/>
  <polygon points="250,300 270,340 230,340" fill="none" stroke="#dff4ea" stroke-width="2" opacity="0.35"/>
  <!-- Number trail -->
  <text x="80" y="90" font-family="sans-serif" font-size="18" fill="#dff4ea" opacity="0.35">1</text>
  <text x="120" y="75" font-family="sans-serif" font-size="20" fill="#dff4ea" opacity="0.3">2</text>
  <text x="160" y="85" font-family="sans-serif" font-size="16" fill="#dff4ea" opacity="0.35">3</text>
  <text x="195" y="70" font-family="sans-serif" font-size="22" fill="#dff4ea" opacity="0.25">5</text>
  <!-- Star burst decoration -->
  <circle cx="150" cy="170" r="40" fill="#00c389" opacity="0.3"/>
  <circle cx="150" cy="170" r="28" fill="#007a58" opacity="0.4"/>
  <text x="150" y="180" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="28" fill="#ffffff" opacity="0.9">∑</text>
  <!-- Title -->
  <text x="150" y="255" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="34" fill="#ffffff">수학대탐험</text>
  <!-- Decorative dots -->
  <circle cx="75" cy="270" r="3" fill="#dff4ea" opacity="0.5"/>
  <circle cx="95" cy="270" r="3" fill="#dff4ea" opacity="0.5"/>
  <circle cx="115" cy="270" r="3" fill="#dff4ea" opacity="0.5"/>
  <circle cx="185" cy="270" r="3" fill="#dff4ea" opacity="0.5"/>
  <circle cx="205" cy="270" r="3" fill="#dff4ea" opacity="0.5"/>
  <circle cx="225" cy="270" r="3" fill="#dff4ea" opacity="0.5"/>
  <text x="150" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#dff4ea" opacity="0.8">수학의 세계로 떠나는 신나는 모험!</text>
  <!-- Publisher badge -->
  <rect x="100" y="310" width="100" height="20" rx="10" fill="#007a58" opacity="0.6"/>
  <text x="150" y="324" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#dff4ea">주니어김영사</text>
  <!-- Author -->
  <text x="150" y="375" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" opacity="0.9">김연숙</text>
</svg>