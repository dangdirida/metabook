<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#007a58"/>
      <stop offset="50%" stop-color="#32d29d"/>
      <stop offset="100%" stop-color="#00c389"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg9)"/>
  <!-- Traditional Korean roof pattern (simplified) -->
  <path d="M60,90 Q150,40 240,90" fill="none" stroke="#262d2e" stroke-width="3" opacity="0.4"/>
  <path d="M55,85 Q150,35 245,85" fill="none" stroke="#262d2e" stroke-width="2" opacity="0.3"/>
  <line x1="90" y1="90" x2="90" y2="140" stroke="#262d2e" stroke-width="2" opacity="0.3"/>
  <line x1="210" y1="90" x2="210" y2="140" stroke="#262d2e" stroke-width="2" opacity="0.3"/>
  <line x1="80" y1="140" x2="220" y2="140" stroke="#262d2e" stroke-width="2" opacity="0.3"/>
  <!-- Door -->
  <rect x="135" y="110" width="30" height="30" rx="2" fill="none" stroke="#262d2e" stroke-width="1.5" opacity="0.3"/>
  <line x1="150" y1="110" x2="150" y2="140" stroke="#262d2e" stroke-width="1" opacity="0.2"/>
  <!-- Scroll/map element -->
  <rect x="40" y="280" width="60" height="80" rx="3" fill="#dff4ea" opacity="0.15"/>
  <line x1="50" y1="295" x2="90" y2="295" stroke="#262d2e" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="305" x2="85" y2="305" stroke="#262d2e" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="315" x2="88" y2="315" stroke="#262d2e" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="325" x2="80" y2="325" stroke="#262d2e" stroke-width="1" opacity="0.2"/>
  <!-- Shield/crest -->
  <path d="M230,270 L250,280 L250,310 L230,325 L210,310 L210,280 Z" fill="none" stroke="#dff4ea" stroke-width="1.5" opacity="0.3"/>
  <text x="230" y="305" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="16" fill="#dff4ea" opacity="0.3">韓</text>
  <!-- Compass/adventure element -->
  <circle cx="150" cy="200" r="3" fill="#262d2e" opacity="0.4"/>
  <line x1="150" y1="185" x2="150" y2="215" stroke="#262d2e" stroke-width="1.5" opacity="0.3"/>
  <line x1="135" y1="200" x2="165" y2="200" stroke="#262d2e" stroke-width="1.5" opacity="0.3"/>
  <polygon points="150,185 146,195 154,195" fill="#dff4ea" opacity="0.4"/>
  <!-- Decorative Korean patterns -->
  <rect x="20" y="155" width="12" height="12" fill="none" stroke="#dff4ea" stroke-width="1" opacity="0.25" transform="rotate(45,26,161)"/>
  <rect x="268" y="155" width="12" height="12" fill="none" stroke="#dff4ea" stroke-width="1" opacity="0.25" transform="rotate(45,274,161)"/>
  <!-- Title -->
  <text x="150" y="240" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="32" fill="#ffffff">한국사 대모험</text>
  <text x="150" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#dff4ea" opacity="0.8">역사 속으로 떠나는 흥미진진한 여행!</text>
  <!-- Publisher badge -->
  <rect x="100" y="340" width="100" height="20" rx="10" fill="#007a58" opacity="0.5"/>
  <text x="150" y="354" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#dff4ea">주니어김영사</text>
  <!-- Author -->
  <text x="150" y="385" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" opacity="0.9">이현정</text>
  <!-- Top pattern -->
  <rect x="0" y="0" width="300" height="6" fill="#262d2e" opacity="0.3"/>
  <rect x="0" y="0" width="60" height="6" fill="#dff4ea" opacity="0.3"/>
  <rect x="120" y="0" width="60" height="6" fill="#dff4ea" opacity="0.3"/>
  <rect x="240" y="0" width="60" height="6" fill="#dff4ea" opacity="0.3"/>
</svg>