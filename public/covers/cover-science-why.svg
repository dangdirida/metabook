<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c389"/>
      <stop offset="50%" stop-color="#32d29d"/>
      <stop offset="100%" stop-color="#7e5ae2"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg6)"/>
  <!-- Question marks scattered playfully -->
  <text x="40" y="55" font-family="sans-serif" font-weight="bold" font-size="36" fill="#ffffff" opacity="0.2">?</text>
  <text x="240" y="80" font-family="sans-serif" font-weight="bold" font-size="28" fill="#dff4ea" opacity="0.25">?</text>
  <text x="260" y="200" font-family="sans-serif" font-weight="bold" font-size="20" fill="#ffffff" opacity="0.2">?</text>
  <text x="25" y="310" font-family="sans-serif" font-weight="bold" font-size="30" fill="#dff4ea" opacity="0.2">?</text>
  <!-- Atom symbol -->
  <circle cx="150" cy="120" r="8" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="150" cy="120" rx="45" ry="18" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="150" cy="120" rx="45" ry="18" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4" transform="rotate(60,150,120)"/>
  <ellipse cx="150" cy="120" rx="45" ry="18" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4" transform="rotate(-60,150,120)"/>
  <!-- Flask shape -->
  <line x1="70" y1="200" x2="70" y2="250" stroke="#dff4ea" stroke-width="2" opacity="0.4"/>
  <line x1="90" y1="200" x2="90" y2="250" stroke="#dff4ea" stroke-width="2" opacity="0.4"/>
  <line x1="70" y1="250" x2="55" y2="290" stroke="#dff4ea" stroke-width="2" opacity="0.4"/>
  <line x1="90" y1="250" x2="105" y2="290" stroke="#dff4ea" stroke-width="2" opacity="0.4"/>
  <line x1="55" y1="290" x2="105" y2="290" stroke="#dff4ea" stroke-width="2" opacity="0.4"/>
  <!-- Bubbles from flask -->
  <circle cx="75" cy="240" r="3" fill="#dff4ea" opacity="0.3"/>
  <circle cx="82" cy="228" r="2" fill="#dff4ea" opacity="0.25"/>
  <circle cx="78" cy="218" r="2.5" fill="#dff4ea" opacity="0.2"/>
  <!-- Magnifying glass -->
  <circle cx="230" cy="270" r="20" fill="none" stroke="#dff4ea" stroke-width="2.5" opacity="0.4"/>
  <line x1="244" y1="284" x2="260" y2="300" stroke="#dff4ea" stroke-width="3" opacity="0.4"/>
  <!-- Lightning bolt -->
  <polygon points="140,60 148,55 144,70 152,65 142,85 146,72 138,76" fill="#dff4ea" opacity="0.3"/>
  <!-- Title -->
  <text x="150" y="190" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="30" fill="#ffffff">과학이 궁금해!</text>
  <text x="150" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#dff4ea" opacity="0.8">세상을 이해하는 가장 신나는 방법</text>
  <!-- Publisher badge -->
  <rect x="100" y="325" width="100" height="20" rx="10" fill="rgba(0,0,0,0.2)"/>
  <text x="150" y="339" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#dff4ea">주니어김영사</text>
  <!-- Author -->
  <text x="150" y="375" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" opacity="0.9">박지원</text>
  <!-- Top colorful dots -->
  <circle cx="120" cy="15" r="5" fill="#32d29d" opacity="0.5"/>
  <circle cx="140" cy="15" r="5" fill="#7e5ae2" opacity="0.5"/>
  <circle cx="160" cy="15" r="5" fill="#00c389" opacity="0.5"/>
  <circle cx="180" cy="15" r="5" fill="#5b1dcd" opacity="0.5"/>
</svg>