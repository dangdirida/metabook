<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <radialGradient id="bg10" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#262d2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="blackhole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="60%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#5b1dcd" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg10)"/>
  <!-- Stars -->
  <circle cx="20" cy="30" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="55" cy="15" r="0.6" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="45" r="1.2" fill="#fff" opacity="0.8"/>
  <circle cx="200" cy="20" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="270" cy="50" r="1.1" fill="#fff" opacity="0.7"/>
  <circle cx="280" cy="10" r="0.7" fill="#fff" opacity="0.5"/>
  <circle cx="15" cy="180" r="0.9" fill="#fff" opacity="0.6"/>
  <circle cx="285" cy="250" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="40" cy="350" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="260" cy="380" r="1.1" fill="#fff" opacity="0.6"/>
  <!-- Black hole with accretion disk -->
  <ellipse cx="150" cy="140" rx="80" ry="25" fill="none" stroke="#7e5ae2" stroke-width="1" opacity="0.3"/>
  <ellipse cx="150" cy="140" rx="65" ry="20" fill="none" stroke="#7e5ae2" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="150" cy="140" rx="50" ry="15" fill="none" stroke="#5b1dcd" stroke-width="2" opacity="0.5"/>
  <circle cx="150" cy="140" r="22" fill="url(#blackhole)"/>
  <circle cx="150" cy="140" r="15" fill="#000"/>
  <!-- Light bending effect -->
  <path d="M100,100 Q130,130 120,160" fill="none" stroke="#7e5ae2" stroke-width="0.8" opacity="0.3"/>
  <path d="M200,100 Q170,130 180,160" fill="none" stroke="#7e5ae2" stroke-width="0.8" opacity="0.3"/>
  <!-- Clock/time elements -->
  <circle cx="60" cy="280" r="18" fill="none" stroke="#6c7e84" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="280" x2="60" y2="268" stroke="#6c7e84" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="280" x2="70" y2="283" stroke="#6c7e84" stroke-width="1" opacity="0.4"/>
  <!-- Warped spacetime grid -->
  <path d="M30,200 Q150,220 270,200" fill="none" stroke="#6c7e84" stroke-width="0.5" opacity="0.2"/>
  <path d="M30,210 Q150,240 270,210" fill="none" stroke="#6c7e84" stroke-width="0.5" opacity="0.2"/>
  <path d="M30,220 Q150,260 270,220" fill="none" stroke="#6c7e84" stroke-width="0.5" opacity="0.15"/>
  <!-- Hourglass shape -->
  <polygon points="230,260 250,260 245,280 235,280" fill="none" stroke="#6c7e84" stroke-width="1" opacity="0.3"/>
  <polygon points="235,280 245,280 250,300 230,300" fill="none" stroke="#6c7e84" stroke-width="1" opacity="0.3"/>
  <circle cx="240" cy="280" r="2" fill="#7e5ae2" opacity="0.5"/>
  <!-- Title -->
  <text x="150" y="330" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="36" fill="#ffffff" letter-spacing="4">시간의 역사</text>
  <line x1="70" y1="342" x2="230" y2="342" stroke="#7e5ae2" stroke-width="1" opacity="0.5"/>
  <text x="150" y="358" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ebe8fc" opacity="0.6">빅뱅에서 블랙홀까지, 시간과 우주의 비밀</text>
  <!-- Author -->
  <text x="150" y="385" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ebe8fc" opacity="0.8">스티븐 호킹</text>
</svg>