<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262d2e"/>
      <stop offset="100%" stop-color="#5b1dcd"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg7)"/>
  <!-- Circuit/tech pattern -->
  <line x1="0" y1="60" x2="80" y2="60" stroke="#7e5ae2" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="60" x2="80" y2="100" stroke="#7e5ae2" stroke-width="1" opacity="0.3"/>
  <circle cx="80" cy="100" r="3" fill="#7e5ae2" opacity="0.4"/>
  <line x1="220" y1="40" x2="300" y2="40" stroke="#7e5ae2" stroke-width="1" opacity="0.3"/>
  <line x1="220" y1="40" x2="220" y2="80" stroke="#7e5ae2" stroke-width="1" opacity="0.3"/>
  <circle cx="220" cy="80" r="3" fill="#7e5ae2" opacity="0.4"/>
  <line x1="0" y1="340" x2="60" y2="340" stroke="#7e5ae2" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="340" x2="60" y2="300" stroke="#7e5ae2" stroke-width="1" opacity="0.2"/>
  <line x1="240" y1="360" x2="300" y2="360" stroke="#7e5ae2" stroke-width="1" opacity="0.2"/>
  <line x1="240" y1="360" x2="240" y2="320" stroke="#7e5ae2" stroke-width="1" opacity="0.2"/>
  <!-- Human figure transforming to digital -->
  <circle cx="120" cy="120" r="15" fill="none" stroke="#ebe8fc" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="135" x2="120" y2="175" stroke="#ebe8fc" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="150" x2="105" y2="165" stroke="#ebe8fc" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="150" x2="135" y2="165" stroke="#ebe8fc" stroke-width="1.5" opacity="0.5"/>
  <!-- Arrow transition -->
  <line x1="145" y1="145" x2="165" y2="145" stroke="#7e5ae2" stroke-width="2" opacity="0.6"/>
  <polygon points="165,140 175,145 165,150" fill="#7e5ae2" opacity="0.6"/>
  <!-- Digital/AI figure -->
  <rect x="185" y="105" width="30" height="30" rx="2" fill="none" stroke="#7e5ae2" stroke-width="1.5" opacity="0.6"/>
  <circle cx="195" cy="116" r="3" fill="#7e5ae2" opacity="0.5"/>
  <circle cx="205" cy="116" r="3" fill="#7e5ae2" opacity="0.5"/>
  <line x1="193" y1="126" x2="207" y2="126" stroke="#7e5ae2" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="135" x2="200" y2="175" stroke="#7e5ae2" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="150" x2="185" y2="165" stroke="#7e5ae2" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="150" x2="215" y2="165" stroke="#7e5ae2" stroke-width="1.5" opacity="0.5"/>
  <!-- Binary code suggestion -->
  <text x="30" y="220" font-family="monospace" font-size="8" fill="#7e5ae2" opacity="0.2">01001000 01101111</text>
  <text x="160" y="220" font-family="monospace" font-size="8" fill="#7e5ae2" opacity="0.2">01101101 01101111</text>
  <!-- Title -->
  <text x="150" y="260" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="40" fill="#ffffff" letter-spacing="5">호모 데우스</text>
  <line x1="60" y1="275" x2="240" y2="275" stroke="#7e5ae2" stroke-width="1.5" opacity="0.5"/>
  <text x="150" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ebe8fc" opacity="0.7">미래의 역사, 인간에서 신이 되다</text>
  <!-- Author -->
  <text x="150" y="375" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ebe8fc" opacity="0.8">유발 하라리</text>
  <!-- Top accent -->
  <rect x="0" y="0" width="300" height="3" fill="#7e5ae2"/>
</svg>